---
- name: Create user accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    create_home: true
    password: "{{ item.password | default(omit) }}"
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'present'

- name: Add SSH authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.ssh_keys | join('\n') }}"
    exclusive: true
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) == 'present'
    - item.ssh_keys is defined
    - item.ssh_keys | length > 0

- name: Grant sudo access (passwordless - for service accounts)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: '/usr/sbin/visudo -cf %s'
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) == 'present'
    - item.sudo | default(false)
    - item.sudo_nopasswd | default(false)

- name: Grant sudo access (with password - for human users)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: '/usr/sbin/visudo -cf %s'
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) == 'present'
    - item.sudo | default(false)
    - not (item.sudo_nopasswd | default(false))

- name: Remove sudo access for non-sudo users
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) == 'present'
    - not (item.sudo | default(false))

- name: Remove users marked as absent
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: absent
    remove: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'absent'

- name: Remove sudoers file for absent users
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'absent'
