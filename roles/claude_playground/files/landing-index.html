<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Playground</title>
  <style>
    :root {
      --bg: #0b0f17;
      --bg2: #111726;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --fg: #e8edf5;
      --muted: #8a96a8;
      --accent: #6ee7b7;
      --accent2: #60a5fa;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(96,165,250,0.18), transparent 60%),
        radial-gradient(1000px 600px at 110% 110%, rgba(110,231,183,0.16), transparent 55%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 40px 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(110, 231, 183, 0); }
      100% { box-shadow: 0 0 0 0 rgba(110, 231, 183, 0); }
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.25;
      padding-bottom: 0.12em;   /* room for descenders (g, y) under background-clip */
      background: linear-gradient(90deg, var(--fg), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.6; }
    .meta {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12.5px;
      color: var(--muted);
    }
    .meta b { color: var(--fg); font-weight: 600; }
    .marker {
      margin-top: 26px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(96, 165, 250, 0.06);
    }
    .marker-label {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .marker-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="status"><span class="dot"></span> Online</div>
    <h1>Welcome to Playground</h1>
    <p>
      This is a sandboxed environment. Deploy and iterate freely here — swap in
      your own stack any time and it will appear at this address.
    </p>

    <!-- ===================================================================
         DEPLOY MARKER — edit the text inside the <span> below, redeploy, and
         reload the page to confirm your change went live.
         =================================================================== -->
    <div class="marker">
      <span class="marker-label">deploy marker</span>
      <span class="marker-text">edit me to test a deploy</span>
    </div>

    <div class="meta">
      <span><b>service</b> playground</span>
      <span><b>runtime</b> rootless docker</span>
    </div>
  </main>
</body>
</html>
