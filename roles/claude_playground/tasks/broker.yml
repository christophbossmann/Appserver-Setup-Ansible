---
# === Steps 7-8 (task.md): install playgroundctl + systemd service ====================
# Deploy the Python broker to /opt/playground-ctl, symlink the CLI into PATH, and
# run it as a persistent root service that creates root:<group> 0660 socket.

- name: Ensure broker install dir exists
  ansible.builtin.file:
    path: "{{ playground_ctl_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy playgroundctl application
  ansible.builtin.copy:
    src: playground-ctl/
    dest: "{{ playground_ctl_install_dir }}/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  register: _pgctl_app_deploy
  notify: Restart playground-ctl

# The two follow-ups need the copied file on disk. In --check on a FRESH host
# the copy above doesn't happen (reports changed), so they must skip; on an
# already-deployed host (copy unchanged) they still run and detect drift.
- name: Make the playgroundctl client executable
  ansible.builtin.file:
    path: "{{ playground_ctl_install_dir }}/playgroundctl.py"
    owner: root
    group: root
    mode: "0755"
  when: not (ansible_check_mode and _pgctl_app_deploy is changed)

- name: Symlink playgroundctl into PATH
  ansible.builtin.file:
    src: "{{ playground_ctl_install_dir }}/playgroundctl.py"
    dest: "{{ playground_ctl_bin }}"
    state: link
  when: not (ansible_check_mode and _pgctl_app_deploy is changed)

- name: Install the playground-ctl systemd unit
  ansible.builtin.template:
    src: playground-ctl.service.j2
    dest: /etc/systemd/system/playground-ctl.service
    owner: root
    group: root
    mode: "0644"
  register: _pgctl_unit
  notify:
    - Reload systemd
    - Restart playground-ctl

# Flush so a freshly installed/updated unit is reloaded and (re)started before
# we assert it is up.
- name: Apply pending broker handlers now
  ansible.builtin.meta: flush_handlers

# Start/verify only make sense once the unit exists on disk. In --check on a
# FRESH host it was never written (template reports changed) — skip; on a
# deployed host these still run and verify the live state.
- name: Enable and start playground-ctl
  ansible.builtin.systemd_service:
    name: playground-ctl
    enabled: true
    state: started
    daemon_reload: true
  when: not (ansible_check_mode and _pgctl_unit is changed)

- name: Verify the broker socket exists with the expected group + mode
  ansible.builtin.stat:
    path: "{{ playground_ctl_socket }}"
  register: _pgctl_sock
  until: _pgctl_sock.stat.exists
  retries: 10
  delay: 1
  when: not (ansible_check_mode and _pgctl_unit is changed)

- name: Assert broker socket ownership and permissions
  ansible.builtin.assert:
    that:
      - _pgctl_sock.stat.exists
      - _pgctl_sock.stat.gr_name == playground_ctl_socket_group
      - _pgctl_sock.stat.mode == "0660"
    fail_msg: >-
      {{ playground_ctl_socket }} is not root:{{ playground_ctl_socket_group }} 0660 as
      expected (got group={{ _pgctl_sock.stat.gr_name | default('?') }},
      mode={{ _pgctl_sock.stat.mode | default('?') }}). Check the broker logs:
      journalctl -u playground-ctl -n 50
  when: not (ansible_check_mode and _pgctl_unit is changed)
