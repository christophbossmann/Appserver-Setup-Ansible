---
- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "0755"
  loop:
    - { path: /opt/monitoring, owner: "root" }
    - { path: "{{ prometheus_data_dir }}", owner: "65534" }
    - { path: "{{ grafana_data_dir }}", owner: "472" }
    - { path: /opt/monitoring/provisioning, owner: "root" }
    - { path: /opt/monitoring/provisioning/datasources, owner: "root" }
    - { path: /opt/monitoring/provisioning/dashboards, owner: "root" }
    - { path: /opt/monitoring/provisioning/dashboards/json, owner: "root" }

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: /opt/monitoring/provisioning/datasources/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana dashboard provider config
  ansible.builtin.template:
    src: dashboard-provider.yml.j2
    dest: /opt/monitoring/provisioning/dashboards/default.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

# No failed_when: false here — a failed download/transform would provision
# Grafana with missing or wrong-datasource dashboards while the play stays
# green. Retries cover transient grafana.com hiccups. Skipped in --check:
# get_url probes with HEAD there, which grafana.com rejects with 405.
- name: Download Node Exporter dashboard (ID 1860)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/37/download
    dest: /opt/monitoring/provisioning/dashboards/json/node-exporter.json
    mode: "0644"
  register: node_dashboard
  retries: 3
  delay: 5
  until: node_dashboard is not failed
  when: not ansible_check_mode

- name: Download Docker Container dashboard (ID 10619)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/10619/revisions/1/download
    dest: /opt/monitoring/provisioning/dashboards/json/docker-containers.json
    mode: "0644"
    force: true
  register: docker_dashboard
  retries: 3
  delay: 5
  until: docker_dashboard is not failed
  when: not ansible_check_mode

- name: Fix datasource references in downloaded dashboards
  ansible.builtin.copy:
    src: fix-dashboards.py
    dest: /opt/monitoring/fix-dashboards.py
    mode: "0755"

- name: Run dashboard fix script
  ansible.builtin.command: python3 /opt/monitoring/fix-dashboards.py
  changed_when: false

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/monitoring/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

# Start — guarded against --check: command tasks validate chdir even in check
# mode, and on a fresh host /opt/monitoring does not exist there yet.
- name: Pull monitoring stack images
  ansible.builtin.command: docker compose pull
  args:
    chdir: /opt/monitoring
  register: monitoring_pull
  changed_when: "'Pull complete' in monitoring_pull.stderr or 'Downloaded' in monitoring_pull.stderr"
  when: not ansible_check_mode

- name: Start monitoring stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /opt/monitoring
  register: monitoring_up
  changed_when: "monitoring_up.stderr is search('Started|Creating|Created|Recreating|Recreated')"
  when: not ansible_check_mode

# No failed_when: false — a Grafana that never becomes healthy must fail the
# play, not just print a hint.
- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ grafana_port }}/api/health"
    status_code: [200]
  register: grafana_health
  retries: 15
  delay: 5
  until: grafana_health is not failed

- name: Show monitoring stack status
  ansible.builtin.debug:
    msg: >
      {% if grafana_health.status is defined and grafana_health.status == 200 %}
      Monitoring stack is running and healthy.
      {% else %}
      Health check skipped (check mode).
      {% endif %}
      Grafana: http://{{ ansible_host }}:{{ grafana_port }}
      Login: {{ grafana_admin_user }}
      Prometheus datasource and dashboards are auto-configured.
      Dashboards: Node Exporter Full (host metrics) + Docker Container & Host Metrics.
